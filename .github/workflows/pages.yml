name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: movewise-react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: movewise-react/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          NODE_ENV: production
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/

      - name: Copy presentation files into build output
        run: cp -r ../presentation dist/presentation
        working-directory: movewise-react

      - uses: actions/upload-pages-artifact@v3
        with:
          path: movewise-react/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Wait for any in-progress deployment to finish
        run: sleep 30

      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          error_count: 15
          reporting_interval: 10000
          timeout: 600000
